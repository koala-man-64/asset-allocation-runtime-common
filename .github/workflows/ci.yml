name: Runtime Common CI
run-name: Runtime Common CI / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-common-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: actionlint
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11

  build-test:
    name: build-test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            python/pyproject.toml

      - name: Verify contracts dependency spec resolves from published stable versions
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python scripts/verify_pinned_dependency.py --package asset-allocation-contracts --mode published

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e 'python[test]'
          python -m pip check

      - name: Run ruff
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff check python tests

      - name: Run test suite
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest tests/python -q

      - name: Validate release prep script
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          function Get-CurrentVersion {
              param([string]$Content)

              $match = [regex]::Match($Content, '(?m)^version = "(?<version>\d+\.\d+\.\d+)"$')
              if (-not $match.Success) {
                  throw "Could not locate the package version in python/pyproject.toml."
              }

              return $match.Groups["version"].Value
          }

          function Get-NextPatchVersion {
              param([string]$Version)

              if ($Version -notmatch '^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$') {
                  throw "Current version '$Version' is not stable semver."
              }

              return "{0}.{1}.{2}" -f $matches["major"], $matches["minor"], ([int]$matches["patch"] + 1)
          }

          function Invoke-ExpectedFailure {
              param(
                  [string]$Label,
                  [scriptblock]$Action,
                  [string]$ExpectedMessage
              )

              try {
                  & $Action
              }
              catch {
                  if ($_.Exception.Message -notlike "*$ExpectedMessage*") {
                      throw "$Label failed with an unexpected message: $($_.Exception.Message)"
                  }

                  return
              }

              throw "$Label succeeded unexpectedly."
          }

          $sourceRoot = $env:GITHUB_WORKSPACE
          $tempRoot = Join-Path $env:RUNNER_TEMP "runtime-common-release-prep"
          if (Test-Path -LiteralPath $tempRoot) {
              Remove-Item -LiteralPath $tempRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $tempRoot | Out-Null
          $tempRepo = Join-Path $tempRoot "repo"
          New-Item -ItemType Directory -Path $tempRepo | Out-Null
          Get-ChildItem -LiteralPath $sourceRoot -Force |
              Where-Object { $_.Name -ne ".git" } |
              Copy-Item -Destination $tempRepo -Recurse -Force

          $scriptPath = Join-Path $tempRepo "scripts/prepare-release.ps1"
          $pyprojectPath = Join-Path $tempRepo "python/pyproject.toml"
          $contractPath = Join-Path $tempRepo "docs/architecture/architecture-contract.md"
          $expectedFiles = @(
              "docs/architecture/architecture-contract.md",
              "python/pyproject.toml"
          )

          $originalPyproject = Get-Content -LiteralPath $pyprojectPath -Raw
          $originalContract = Get-Content -LiteralPath $contractPath -Raw
          $currentVersion = Get-CurrentVersion -Content $originalPyproject
          $nextVersion = Get-NextPatchVersion -Version $currentVersion

          $dryRunOutput = @(& $scriptPath -Version $nextVersion -DryRun)
          $reportedFiles = @(
              $dryRunOutput |
                  Where-Object { $_ -is [string] -and $_.StartsWith("- ") } |
                  ForEach-Object { $_.Substring(2) } |
                  Sort-Object -Unique
          )
          if (($reportedFiles -join ",") -ne ($expectedFiles -join ",")) {
              throw "Dry run reported unexpected files: $($reportedFiles -join ', ')"
          }

          if ((Get-Content -LiteralPath $pyprojectPath -Raw) -ne $originalPyproject) {
              throw "Dry run modified python/pyproject.toml."
          }

          if ((Get-Content -LiteralPath $contractPath -Raw) -ne $originalContract) {
              throw "Dry run modified docs/architecture/architecture-contract.md."
          }

          Set-Item -Path function:Read-Host -Value { param([string]$Prompt) $nextVersion }
          try {
              $promptDryRunOutput = @(& $scriptPath -DryRun)
          }
          finally {
              Remove-Item -Path function:Read-Host -ErrorAction SilentlyContinue
          }
          if ($promptDryRunOutput.Count -lt 1 -or $promptDryRunOutput[0] -ne "Current version: $currentVersion") {
              throw "Prompt mode did not print the current version before prompting."
          }

          & $scriptPath -Version $nextVersion

          $updatedPyproject = Get-Content -LiteralPath $pyprojectPath -Raw
          $updatedContract = Get-Content -LiteralPath $contractPath -Raw
          if ($updatedPyproject -eq $originalPyproject) {
              throw "Apply mode did not rewrite python/pyproject.toml."
          }

          if ($updatedContract -eq $originalContract) {
              throw "Apply mode did not rewrite docs/architecture/architecture-contract.md."
          }

          if (-not $updatedPyproject.Contains("version = ""$nextVersion""")) {
              throw "python/pyproject.toml was not updated to $nextVersion."
          }

          $expectedContractLine = '| Canonical Baseline | `main` branch, package version `{0}` in `python/pyproject.toml` |' -f $nextVersion
          if (-not $updatedContract.Contains($expectedContractLine)) {
              throw "docs/architecture/architecture-contract.md was not updated to $nextVersion."
          }

          Invoke-ExpectedFailure -Label "invalid version" -ExpectedMessage "must match stable semver" -Action {
              & $scriptPath -Version "1.2"
          }

          Invoke-ExpectedFailure -Label "unchanged version" -ExpectedMessage "matches the current package version" -Action {
              & $scriptPath -Version $nextVersion
          }

          $brokenRepo = Join-Path $tempRoot "broken-repo"
          New-Item -ItemType Directory -Path $brokenRepo | Out-Null
          Get-ChildItem -LiteralPath $tempRepo -Force |
              Copy-Item -Destination $brokenRepo -Recurse -Force
          $brokenContractPath = Join-Path $brokenRepo "docs/architecture/architecture-contract.md"
          $brokenContract = (Get-Content -LiteralPath $brokenContractPath -Raw).Replace(
              $expectedContractLine,
              "| Canonical Baseline | release baseline missing |"
          )
          [System.IO.File]::WriteAllText(
              $brokenContractPath,
              $brokenContract,
              [System.Text.UTF8Encoding]::new($false)
          )

          Invoke-ExpectedFailure -Label "missing replacement target" -ExpectedMessage "Expected exactly one architecture contract canonical baseline line target" -Action {
              & (Join-Path $brokenRepo "scripts/prepare-release.ps1") -Version (Get-NextPatchVersion -Version $nextVersion)
          }

      - name: Build Python distributions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/python
          python -m pip install build
          python -m build python --sdist --wheel --outdir artifacts/python

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: runtime-common-python-dists
          path: artifacts/python/*
          if-no-files-found: error
          retention-days: 14
