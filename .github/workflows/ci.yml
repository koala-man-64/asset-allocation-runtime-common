name: Runtime Common CI
run-name: Runtime Common CI / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-common-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: actionlint
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11

  build-test:
    name: build-test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            python/pyproject.toml

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e python[test]
          python -m pip check

      - name: Run ruff
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff check python tests

      - name: Run test suite
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest tests/python -q

      - name: Build Python distributions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/python
          python -m pip install build
          python -m build python --sdist --wheel --outdir artifacts/python

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: runtime-common-python-dists
          path: artifacts/python/*
          if-no-files-found: error
          retention-days: 14

