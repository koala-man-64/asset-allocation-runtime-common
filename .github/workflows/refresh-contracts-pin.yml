name: Runtime Common Contracts Pin Refresh
run-name: Runtime Common Contracts Pin Refresh / ${{ github.event_name }}

on:
  schedule:
    - cron: "23 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: runtime-common-contracts-pin-refresh
  cancel-in-progress: true

jobs:
  refresh-contracts-pin:
    name: refresh-contracts-pin
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: refs/heads/main

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            python/pyproject.toml

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.DISPATCH_APP_ID }}
          private-key: ${{ secrets.DISPATCH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Configure refresh git identity
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Refresh contracts pin to latest stable published version
        id: refresh
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python scripts/verify_pinned_dependency.py --package asset-allocation-contracts --mode sync-latest

          contracts_spec="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("python/pyproject.toml").read_text(encoding="utf-8"))
          for dependency in pyproject["project"].get("dependencies", []):
              if dependency.startswith("asset-allocation-contracts=="):
                  print(dependency)
                  break
          else:
              raise SystemExit("asset-allocation-contracts pin not found after refresh")
          PY
          )"

          if git diff --quiet -- python/pyproject.toml; then
            echo "contracts_pin_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "contracts_pin_changed=true" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "contracts_spec=${contracts_spec}"
            echo "contracts_version=${contracts_spec#asset-allocation-contracts==}"
          } >> "$GITHUB_OUTPUT"

      - name: Commit refreshed contracts pin to main
        if: steps.refresh.outputs.contracts_pin_changed == 'true'
        env:
          CONTRACTS_VERSION: ${{ steps.refresh.outputs.contracts_version }}
        shell: bash
        run: |
          set -euo pipefail
          git add python/pyproject.toml
          git commit -m "chore(deps): update asset-allocation-contracts to ${CONTRACTS_VERSION}"
          git push origin HEAD:main

      - name: Install test dependencies
        id: install
        if: steps.refresh.outputs.contracts_pin_changed == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e 'python[test]'

      - name: Run pip check
        id: pip_check
        if: steps.refresh.outputs.contracts_pin_changed == 'true' && steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python -m pip check

      - name: Run ruff
        id: ruff
        if: steps.refresh.outputs.contracts_pin_changed == 'true' && steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff check python tests

      - name: Run test suite
        id: pytest
        if: steps.refresh.outputs.contracts_pin_changed == 'true' && steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest tests/python -q

      - name: Write refresh summary
        if: always()
        env:
          CONTRACTS_PIN_CHANGED: ${{ steps.refresh.outputs.contracts_pin_changed }}
          CONTRACTS_SPEC: ${{ steps.refresh.outputs.contracts_spec }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          PIP_CHECK_OUTCOME: ${{ steps.pip_check.outcome }}
          RUFF_OUTCOME: ${{ steps.ruff.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
        shell: bash
        run: |
          {
            echo "## Contracts pin refresh"
            echo ""
            echo "- Contracts spec: \`${CONTRACTS_SPEC}\`"
            echo "- Main updated: \`${CONTRACTS_PIN_CHANGED:-false}\`"
            if [ "${CONTRACTS_PIN_CHANGED:-false}" = "true" ]; then
              echo "- Install outcome: \`${INSTALL_OUTCOME}\`"
              echo "- Pip check outcome: \`${PIP_CHECK_OUTCOME}\`"
              echo "- Ruff outcome: \`${RUFF_OUTCOME}\`"
              echo "- Pytest outcome: \`${PYTEST_OUTCOME}\`"
            else
              echo "- Refresh result: \`already latest stable published version\`"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Fail workflow when refreshed pin breaks validation
        if: always() && steps.refresh.outputs.contracts_pin_changed == 'true'
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          PIP_CHECK_OUTCOME: ${{ steps.pip_check.outcome }}
          RUFF_OUTCOME: ${{ steps.ruff.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          failures=()

          if [ "${INSTALL_OUTCOME}" != "success" ]; then
            failures+=("install")
          fi

          if [ "${INSTALL_OUTCOME}" = "success" ] && [ "${PIP_CHECK_OUTCOME}" != "success" ]; then
            failures+=("pip-check")
          fi

          if [ "${INSTALL_OUTCOME}" = "success" ] && [ "${RUFF_OUTCOME}" != "success" ]; then
            failures+=("ruff")
          fi

          if [ "${INSTALL_OUTCOME}" = "success" ] && [ "${PYTEST_OUTCOME}" != "success" ]; then
            failures+=("pytest")
          fi

          if [ "${#failures[@]}" -gt 0 ]; then
            echo "Refreshed contracts pin requires fix-forward work. Failed checks: ${failures[*]}" >&2
            exit 1
          fi
